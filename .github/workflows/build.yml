name: Build APK 🚚

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b 3.19.6 /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          /opt/flutter/bin/flutter config --no-analytics
          /opt/flutter/bin/flutter precache --android

      - name: Flutter pub get
        run: flutter pub get

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
        run: |
          flutter build apk \
            --release \
            --no-shrink \
            --no-tree-shake-icons \
            --dart-define=FLUTTER_WEB_CANVASKIT_URL=none

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: truck-market-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK info
        run: |
          ls -lh build/app/outputs/flutter-apk/
          echo "✅ APK built successfully!"
