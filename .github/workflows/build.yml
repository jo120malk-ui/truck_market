name: Build APK 🚚

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project and replace lib
        run: |
          # Create a fresh Flutter project alongside
          flutter create --org com.truckmarket --project-name truck_market /tmp/fresh_app
          
          # Replace lib folder with our code
          rm -rf /tmp/fresh_app/lib
          cp -r lib /tmp/fresh_app/lib
          
          # Replace pubspec.yaml
          cp pubspec.yaml /tmp/fresh_app/pubspec.yaml
          
          # Replace assets if any
          mkdir -p /tmp/fresh_app/assets/images
          
          echo "Fresh project created"
          ls /tmp/fresh_app/android/

      - name: Get dependencies
        working-directory: /tmp/fresh_app
        run: flutter pub get

      - name: Build APK
        working-directory: /tmp/fresh_app
        run: flutter build apk --release --no-shrink

      - uses: actions/upload-artifact@v4
        with:
          name: truck-market-apk
          path: /tmp/fresh_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
