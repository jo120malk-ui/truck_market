name: Build APK 🚚

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Setup project
        run: |
          flutter create --org com.truckmarket --project-name truck_market /tmp/fresh_app
          rm -rf /tmp/fresh_app/lib
          cp -r lib /tmp/fresh_app/lib
          cp pubspec.yaml /tmp/fresh_app/pubspec.yaml
          mkdir -p /tmp/fresh_app/assets/images

      - name: Get dependencies
        working-directory: /tmp/fresh_app
        run: flutter pub get

      - name: Dart analyze
        working-directory: /tmp/fresh_app
        run: flutter analyze 2>&1 || true

      - name: Build APK verbose
        working-directory: /tmp/fresh_app
        run: flutter build apk --release --no-shrink --verbose 2>&1 | tail -100

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: truck-market-apk
          path: /tmp/fresh_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
