name: Build APK 🚚

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project and replace lib
        run: |
          flutter create --org com.truckmarket --project-name truck_market /tmp/fresh_app
          rm -rf /tmp/fresh_app/lib
          cp -r lib /tmp/fresh_app/lib
          cp pubspec.yaml /tmp/fresh_app/pubspec.yaml
          mkdir -p /tmp/fresh_app/assets/images

      - name: Get dependencies
        working-directory: /tmp/fresh_app
        run: flutter pub get

      - name: Build APK with full output
        working-directory: /tmp/fresh_app
        run: |
          flutter build apk --release --no-shrink 2>&1 | tee /tmp/build_output.txt || true
          echo "=== Last 80 lines of build output ==="
          tail -80 /tmp/build_output.txt
          echo "=== Check if APK was created ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          exit $(grep -c "FAILED\|BUILD FAILED" /tmp/build_output.txt | python3 -c "import sys; print(1 if int(sys.stdin.read().strip())>0 else 0)")

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: truck-market-apk
          path: |
            /tmp/fresh_app/build/app/outputs/flutter-apk/*.apk
            /tmp/build_output.txt
          retention-days: 30
